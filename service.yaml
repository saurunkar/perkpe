apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: sentinel-finance-os
  labels:
    cloud.googleapis.com/location: us-central1
  annotations:
    run.googleapis.com/launch-stage: BETA
spec:
  template:
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      serviceAccountName: sentinel-finance-os-sa@gdgpune-455206.iam.gserviceaccount.com
      containers:
      - image: us-central1-docker.pkg.dev/gdgpune-455206/sentinel/finance-os:latest
        ports:
        - name: http1
          containerPort: 8080
        resources:
          limits:
            cpu: "1000m"
            memory: "2Gi"
        env:
        - name: APP_ENV
          value: "production"
        - name: ALLOYDB_HOST
          value: "10.11.0.2"
        - name: ALLOYDB_DB
          value: "sentinel_db"
        - name: ALLOYDB_USER
          value: "sentinel_app"
        # Secret Manager Integration for DB Password
        - name: ALLOYDB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: sentinel_db_password
              key: latest
        - name: GCP_PROJECT_ID
          value: "gdgpune-455206"
      vpcAccess:
        networkInterfaces:
        - network: default
          subnetwork: default
